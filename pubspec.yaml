name: diginotes
description: A Flutter app to organize photos and videos with notes
publish_to: 'none'

version: 1.0.12

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  file_picker: ^8.1.4
  path_provider: ^2.1.2
  sqflite: ^2.3.2
  audioplayers: ^5.2.1
  flutter_sound: ^9.2.13
  permission_handler: ^11.3.0
  video_player: ^2.8.2
  chewie: ^1.8.1
  provider: ^6.1.1
  path: ^1.8.3
  photo_view: ^0.14.0
  url_launcher: ^6.2.4
  share_plus: ^7.2.2
  android_intent_plus: ^5.0.2
  video_thumbnail: ^0.5.6  # NEW: For generating video thumbnails
  quick_actions: ^1.0.7
  share_handler: ^0.0.23
  emoji_picker_flutter: ^1.6.3
  google_sign_in: ^6.2.1
  googleapis: ^12.0.0
  http: ^1.2.0
  archive: ^3.4.10
  shared_preferences: ^2.2.3
# ADD THIS
  workmanager:
    git:
      url: https://github.com/fluttercommunity/flutter_workmanager.git
      path: workmanager
      ref: main

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

#flutter pub get
#flutter pub run flutter_launcher_icons:main

flutter:
  uses-material-design: true

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 48 # min:48, max:256, default: 48
